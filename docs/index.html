<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vent heure par heure - ENS</title>
<style>
  .arrow {
    display: inline-block;
    transform-origin: center;
    font-size: 20px;
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ---- temp colors ----
const WEATHER_TEMP_COLORS = [
  { min: -Infinity, max: -22, color: "#1d469a" },
  { min: -22, max: -16, color: "#1462a9" },
  { min: -15, max: -11, color: "#1674b6" },
  { min: -10, max: -6,  color: "#368ac7" },
  { min: -5,  max: -3,  color: "#3fa3da" },
  { min: 0,   max: 2,   color: "#4ec0ee" },
  { min: 1,   max: 2,   color: "#aedcd8" },
  { min: 3,   max: 4,   color: "#a8d6ad" },
  { min: 5,   max: 6,   color: "#9ed07f" },
  { min: 7,   max: 8,   color: "#aed352" },
  { min: 9,   max: 10,  color: "#d0d93e" },
  { min: 11,  max: 12,  color: "#fcde04" },
  { min: 13,  max: 14,  color: "#fbcb0c" },
  { min: 15,  max: 16,  color: "#fcb716" },
  { min: 17,  max: 18,  color: "#faa31a" },
  { min: 19,  max: 20,  color: "#f68a1f" },
  { min: 21,  max: 24,  color: "#f26a2f" },
  { min: 25,  max: 29,  color: "#ec513a" },
  { min: 30,  max: 35,  color: "#ed2a2a" },
  { min: 36,  max: 40,  color: "#c32027" },
  { min: 41,  max: Infinity, color: "#9b1b1d" }
];

function getTempColor(temp) {
  return WEATHER_TEMP_COLORS.find(r => temp >= r.min && temp <= r.max)?.color ?? "#000";
}

// ---- render ----
fetch("data.json")
  .then(r => r.json())
  .then(data => {
    const container = document.getElementById("app");

    data.hourly.time.forEach((t, i) => {
      const speed = data.hourly.wind_speed_80m[i];
      const dir   = data.hourly.wind_direction_80m[i];
      const temp  = data.hourly.temperature_80m[i];

      const el = document.createElement("div");

      const arrow = document.createElement("span");
      arrow.className = "arrow";
      arrow.textContent = "⮝";

      // rotation
      arrow.style.transform = `rotate(${dir}deg)`;

      // size (10 km/h steps)
      const size = 10 + Math.floor(speed / 10) * 6;
      arrow.style.fontSize = size + "px";

      // color via getTempColor
      arrow.style.color = getTempColor(temp);

      el.textContent = t + " ";
      el.appendChild(arrow);

      container.appendChild(el);
    });
  });
</script>
</body>
</html>
