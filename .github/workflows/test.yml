name: Python Package Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository
    - name: Check out code
      uses: actions/checkout@v3

    # Step 2: Set up Python (you can specify the version)
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.14.3

    # Step 3: Install build dependencies (supports pyproject.toml)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .

    # Step 4: Optionally add any test step
    #- name: Run tests
    #  run: |
    # pytest tests/

    # Step 5: Cache dependencies (for faster builds)
    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # Step 6: Run code and upload output (artifact)
    - name: Run Code and Save Results
      run: |
        python get-prediction.py > results.txt

    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: code-results
        path: results.txt
        compression-level: 0 # no compression
